# Render.com static site deploy (SPEC §3.1 / §7.6)
services:
  - type: web
    name: eczane-cabinet-sim
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Site geneli Gemini anahtarı — değeri Render dashboard'da girilir (repoda tutulmaz)
      - key: VITE_GEMINI_API_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
